name: Lint

on:
  pull_request:
    branches: [main, release/*]
    paths:
      - "**.{js,mjs,mts,ts}"
      - "!{dist,node_modules,src/vendor}/*"
      - "!eslint.config.js"
      - "!gulpfile.mjs"
  push:
    branches: [main, release/*]
    paths:
      - "**.{js,mjs,mts,ts}"
      - "!{dist,node_modules,src/vendor}/*"
      - "!eslint.config.js"
      - "!gulpfile.mjs"
  release:
    types: [created, published]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: "npm"

      - name: Install dependencies
        run: yarn install

      - name: Run ESLint
        run: yarn lint
