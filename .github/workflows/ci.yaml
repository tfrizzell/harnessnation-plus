name: CI

on:
  pull_request:
    branches: [main, release/*]
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
      - ".nvmrc"
      - "eslint.config.js"
      - "global.setup.ts"
      - "gulpfile.mjs"
      - "jest.config.ts"
      - "jest.setup.ts"
      - "package.json"
      - "tsconfig*.json"
      - "yarn.lock"
  push:
    branches: [main, release/*]
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
      - ".nvmrc"
      - "eslint.config.js"
      - "global.setup.ts"
      - "gulpfile.mjs"
      - "jest.config.ts"
      - "jest.setup.ts"
      - "package.json"
      - "tsconfig*.json"
      - "yarn.lock"
  release:
    types: [created, published]

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --immutable --inline-builds

      - name: Type check
        run: yarn typecheck

      - name: Lint code
        run: yarn lint

      - name: Run unit tests
        run: yarn test

      - name: Build extension
        run: yarn build
