name: CI

on:
  pull_request:
    branches: [main, release/*]
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
      - ".nvmrc"
      - "global.setup.ts"
      - "gulpfile.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig*.json"
      - "vitest.config.ts"
      - "vitest.setup.ts"
  push:
    branches: [main, release/*]
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
      - ".nvmrc"
      - "global.setup.ts"
      - "gulpfile.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig*.json"
      - "vitest.config.ts"
      - "vitest.setup.ts"
  release:
    types: [created, published]

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Build extension
        run: pnpm build
